name: Daily Cascade Pipeline

on:
  schedule:
    # 22:00 UTC Monday-Friday (after US market close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (incremental)
        run: python run_pipeline.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cascade_summary.json hormuz_cascade.db
          git diff --staged --quiet || git commit -m "chore: daily pipeline update $(date -u +%Y-%m-%d)"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
